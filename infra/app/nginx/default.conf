server {
  listen 80;
  server_name live.fineludens.kr _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://live.fineludens.kr$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name live.fineludens.kr;

  ssl_certificate /etc/letsencrypt/live/live.fineludens.kr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/live.fineludens.kr/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_prefer_server_ciphers off;

  client_max_body_size 10m;

  location /api/ {
    proxy_pass http://api:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://api:8000/health;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
